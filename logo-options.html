<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Stage Access — Logo Options</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0e1c; font-family: Arial, sans-serif; padding: 48px 32px; }
  h1 { color: #fff; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; opacity: .5; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .label { color: #fff; font-size: 13px; opacity: .5; letter-spacing: 1px; }
  .sub { color: #2259e0; font-size: 11px; font-weight: 700; text-align: center; line-height: 1.5; }
  svg { filter: drop-shadow(0 8px 24px rgba(34,89,224,0.4)); }
</style>
</head>
<body>
<h1>Stage Access · Logo Options</h1>
<div class="grid">

  <!-- OPTION 1: Classic badge with lanyard hole + clean monogram -->
  <div class="option">
    <svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Lanyard string -->
      <path d="M60 0 Q45 18 40 32" stroke="#2259e0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".7"/>
      <path d="M60 0 Q75 18 80 32" stroke="#2259e0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".7"/>
      <!-- Lanyard hole ring -->
      <circle cx="60" cy="4" r="4" stroke="#2259e0" stroke-width="2" fill="#0d0e1c"/>
      <!-- Badge body -->
      <rect x="8" y="30" width="104" height="126" rx="10" fill="#2259e0"/>
      <!-- Inner bg -->
      <rect x="14" y="36" width="92" height="114" rx="7" fill="#1a2fff" opacity=".3"/>
      <!-- Top accent bar -->
      <rect x="8" y="30" width="104" height="6" rx="3" fill="#4a78f0"/>
      <!-- Hole at top center of badge -->
      <circle cx="60" cy="36" r="5" fill="#0d0e1c" opacity=".8"/>
      <!-- SA monogram -->
      <text x="60" y="88" font-family="Arial" font-weight="900" font-size="42" fill="white" text-anchor="middle" letter-spacing="-2">SA</text>
      <!-- Bottom label -->
      <rect x="20" y="118" width="80" height="22" rx="4" fill="rgba(0,0,0,0.25)"/>
      <text x="60" y="133" font-family="Arial" font-weight="700" font-size="9" fill="white" text-anchor="middle" letter-spacing="2">STAGE ACCESS</text>
    </svg>
    <div class="label">Opção 1</div>
    <div class="sub">Monograma SA<br>Badge clássico</div>
  </div>

  <!-- OPTION 2: Credential with clip at top, full wordmark -->
  <div class="option">
    <svg width="120" height="165" viewBox="0 0 120 165" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Clip / carabiner at top -->
      <rect x="48" y="0" width="24" height="12" rx="3" fill="#4a78f0"/>
      <rect x="52" y="3" width="16" height="6" rx="2" fill="#0d0e1c"/>
      <!-- Short strap -->
      <rect x="57" y="11" width="6" height="14" fill="#2259e0"/>
      <!-- Badge body — portrait -->
      <rect x="6" y="24" width="108" height="138" rx="12" fill="#2259e0"/>
      <!-- Shine -->
      <rect x="6" y="24" width="108" height="40" rx="12" fill="white" opacity=".07"/>
      <!-- Border inner -->
      <rect x="12" y="30" width="96" height="126" rx="8" stroke="white" stroke-width="1" stroke-opacity=".2" fill="none"/>
      <!-- "STAGE" large -->
      <text x="60" y="84" font-family="Arial" font-weight="900" font-size="22" fill="white" text-anchor="middle" letter-spacing="1">STAGE</text>
      <!-- divider line -->
      <rect x="22" y="90" width="76" height="2" fill="white" opacity=".25" rx="1"/>
      <!-- "ACCESS" large -->
      <text x="60" y="116" font-family="Arial" font-weight="900" font-size="22" fill="white" text-anchor="middle" letter-spacing="1">ACCESS</text>
      <!-- star/symbol -->
      <circle cx="60" cy="57" r="14" fill="white" opacity=".12"/>
      <text x="60" y="62" font-family="Arial" font-size="18" fill="white" text-anchor="middle">★</text>
      <!-- Bottom strip -->
      <rect x="6" y="144" width="108" height="18" rx="0" fill="rgba(0,0,0,0.2)"/>
      <rect x="6" y="150" width="108" height="12" rx="12" fill="rgba(0,0,0,0.2)"/>
      <!-- barcode lines hint -->
      <g opacity=".4">
        <rect x="22" y="147" width="2" height="10" fill="white"/>
        <rect x="26" y="147" width="1" height="10" fill="white"/>
        <rect x="29" y="147" width="3" height="10" fill="white"/>
        <rect x="34" y="147" width="1" height="10" fill="white"/>
        <rect x="37" y="147" width="2" height="10" fill="white"/>
        <rect x="41" y="147" width="1" height="10" fill="white"/>
        <rect x="44" y="147" width="2" height="10" fill="white"/>
        <rect x="48" y="147" width="3" height="10" fill="white"/>
        <rect x="53" y="147" width="1" height="10" fill="white"/>
        <rect x="56" y="147" width="2" height="10" fill="white"/>
        <rect x="60" y="147" width="1" height="10" fill="white"/>
        <rect x="63" y="147" width="3" height="10" fill="white"/>
        <rect x="68" y="147" width="2" height="10" fill="white"/>
        <rect x="72" y="147" width="1" height="10" fill="white"/>
        <rect x="75" y="147" width="2" height="10" fill="white"/>
        <rect x="79" y="147" width="3" height="10" fill="white"/>
        <rect x="84" y="147" width="1" height="10" fill="white"/>
        <rect x="87" y="147" width="2" height="10" fill="white"/>
        <rect x="91" y="147" width="1" height="10" fill="white"/>
        <rect x="94" y="147" width="3" height="10" fill="white"/>
      </g>
    </svg>
    <div class="label">Opção 2</div>
    <div class="sub">Wordmark completo<br>Clip metálico + barcode</div>
  </div>

  <!-- OPTION 3: Hexagonal/shield badge on lanyard -->
  <div class="option">
    <svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Lanyard cord -->
      <path d="M60 2 C52 14 38 20 32 35" stroke="#2259e0" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M60 2 C68 14 82 20 88 35" stroke="#2259e0" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="60" cy="2" r="5" fill="#2259e0"/>
      <circle cx="60" cy="2" r="2.5" fill="#0d0e1c"/>
      <!-- Badge shield shape -->
      <path d="M60 32 L100 48 L100 110 Q100 150 60 158 Q20 150 20 110 L20 48 Z" fill="#2259e0"/>
      <!-- Inner shield glow -->
      <path d="M60 40 L93 53 L93 108 Q93 142 60 150 Q27 142 27 108 L27 53 Z" fill="#3060f0" opacity=".5"/>
      <!-- Border -->
      <path d="M60 32 L100 48 L100 110 Q100 150 60 158 Q20 150 20 110 L20 48 Z" stroke="#4a78f0" stroke-width="2" fill="none"/>
      <!-- S letter bold -->
      <text x="60" y="102" font-family="Arial" font-weight="900" font-size="52" fill="white" text-anchor="middle">S</text>
      <!-- small A below -->
      <text x="60" y="122" font-family="Arial" font-weight="700" font-size="10" fill="white" text-anchor="middle" letter-spacing="4">ACCESS</text>
      <!-- top accent dots -->
      <circle cx="50" cy="56" r="2" fill="white" opacity=".4"/>
      <circle cx="60" cy="52" r="2" fill="white" opacity=".4"/>
      <circle cx="70" cy="56" r="2" fill="white" opacity=".4"/>
    </svg>
    <div class="label">Opção 3</div>
    <div class="sub">Escudo / Shield<br>Lanyard dupla + letra S</div>
  </div>

  <!-- OPTION 4: Minimal modern — rounded square on thin clip -->
  <div class="option">
    <svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Thin clip -->
      <rect x="54" y="0" width="12" height="18" rx="6" fill="#2259e0"/>
      <rect x="57" y="3" width="6" height="12" rx="3" fill="#0d0e1c"/>
      <!-- Connector -->
      <rect x="58" y="16" width="4" height="10" fill="#2259e0"/>
      <!-- Badge square rounded -->
      <rect x="10" y="25" width="100" height="128" rx="18" fill="#2259e0"/>
      <!-- Gradient overlay -->
      <rect x="10" y="25" width="100" height="64" rx="18" fill="white" opacity=".06"/>
      <!-- Corner accents -->
      <circle cx="28" cy="43" r="4" fill="white" opacity=".15"/>
      <circle cx="92" cy="43" r="4" fill="white" opacity=".15"/>
      <!-- ⚡ lightning bolt icon (stage energy) -->
      <path d="M67 44 L53 75 L62 75 L55 100 L73 65 L63 65 Z" fill="white" opacity=".9"/>
      <!-- SA text bottom -->
      <text x="60" y="122" font-family="Arial" font-weight="900" font-size="13" fill="white" text-anchor="middle" letter-spacing="3">STAGE</text>
      <text x="60" y="140" font-family="Arial" font-weight="900" font-size="13" fill="white" text-anchor="middle" letter-spacing="3">ACCESS</text>
      <!-- bottom thin line decoration -->
      <rect x="30" y="146" width="60" height="1.5" fill="white" opacity=".25" rx="1"/>
    </svg>
    <div class="label">Opção 4</div>
    <div class="sub">Minimalista moderno<br>Raio de energia + wordmark</div>
  </div>

</div>
</body>
</html>
